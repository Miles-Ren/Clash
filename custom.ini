; ===============================
; SSH
; ===============================
ruleset=🔑 RemoteSSH,https://raw.githubusercontent.com/WC-Dream/ACL4SSR/WD/Clash/ssh.list

; ===============================
; FINAL
; ===============================
ruleset=🐟 漏网之鱼,[]FINAL


; =========================================================
; 🔥 策略组（关键：顺序必须保证 DIRECT 存在）
; =========================================================

; ===============================
; 核心入口
; ===============================
custom_proxy_group=🚀 手动切换1`select`🚀 节点选择`DIRECT
custom_proxy_group=♻️ 自动选择`url-test`(.*)`https://cp.cloudflare.com/generate_204`300,,50

; ===============================
; 手动 & 自动
; ===============================
custom_proxy_group=🚀 手动切换1`select`🚀 节点选择`♻️ 自动选择`DIRECT
custom_proxy_group=♻️ 自动选择`url-test`(.*)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🚀 节点选择`select`DIRECT`🚀 手动切换1`♻️ 自动选择

