[custom]
; ===============================
; 小柒 规则 - Stable Final
; ===============================

enable_rule_generator=true
overwrite_original_rules=true
clash_rule_base=https://raw.githubusercontent.com/WC-Dream/ACL4SSR/refs/heads/WD/Clash/GeneralClashConfig.yml

; ===============================
; 基础直连
; ===============================
