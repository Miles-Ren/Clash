ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOIP,CN

ruleset=🎯 全球直连,https://ruleset.skk.moe/List/ip/china_ip.conf
ruleset=🎯 全球直连,https://ruleset.skk.moe/List/non_ip/domestic.conf
